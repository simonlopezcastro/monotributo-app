<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análisis Patrimonial — Monotributistas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
:root {
  /* Neutrales (slate frío) */
  --ink-900: oklch(0.21 0.02 250);
  --ink-700: oklch(0.37 0.02 250);
  --ink-500: oklch(0.55 0.02 250);
  --ink-400: oklch(0.66 0.015 250);
  --line: oklch(0.91 0.008 250);
  --line-strong: oklch(0.85 0.01 250);
  --surface: oklch(0.99 0.003 250);
  --surface-2: oklch(0.975 0.005 250);
  --bg: oklch(0.965 0.006 250);
  --white: #ffffff;

  /* Acento (teal/esmeralda — finanzas) */
  --accent: oklch(0.52 0.11 195);
  --accent-strong: oklch(0.45 0.12 200);
  --accent-soft: oklch(0.95 0.03 195);

  /* Semáforo */
  --ok: oklch(0.58 0.13 155);
  --ok-soft: oklch(0.95 0.05 155);
  --warn: oklch(0.74 0.15 75);
  --warn-soft: oklch(0.96 0.07 80);
  --bad: oklch(0.58 0.18 25);
  --bad-soft: oklch(0.96 0.06 25);

  /* Dólar */
  --usd: oklch(0.5 0.06 150);

  --radius: 10px;
  --radius-sm: 7px;
  --shadow-sm: 0 1px 2px oklch(0.4 0.02 250 / 0.06), 0 1px 3px oklch(0.4 0.02 250 / 0.05);
  --shadow-md: 0 2px 6px oklch(0.4 0.02 250 / 0.07), 0 6px 18px oklch(0.4 0.02 250 / 0.06);

  --font-sans: "IBM Plex Sans", system-ui, -apple-system, sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink-900);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }
.num { font-family: var(--font-mono); font-feature-settings: "tnum" 1; white-space: nowrap; }

/* ============ App shell ============ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 60px;
  background: var(--white);
  border-bottom: 1px solid var(--line);
  box-shadow: var(--shadow-sm);
}
.topbar .brand {
  display: flex;
  align-items: center;
  gap: 11px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.topbar .brand .logo {
  display: flex; align-items: center;
}
.topbar .brand .title { font-size: 15px; }
.topbar .brand .sub { font-size: 11.5px; color: var(--ink-500); font-weight: 500; }
.topbar .spacer { flex: 1; }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  background: var(--white);
  color: var(--ink-700);
  font-size: 13px; font-weight: 500;
  transition: background .12s, border-color .12s, transform .04s;
}
.btn:hover { background: var(--surface-2); border-color: var(--ink-400); }
.btn:active { transform: translateY(1px); }
.btn.primary {
  background: var(--accent); border-color: var(--accent); color: white;
}
.btn.primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--surface-2); }
.btn.danger { color: var(--bad); }
.btn.danger:hover { background: var(--bad-soft); border-color: var(--bad); }
.btn svg { width: 15px; height: 15px; }

/* ============ Layout body ============ */
.body {
  display: flex;
  flex: 1;
  align-items: flex-start;
}
.sidenav {
  position: sticky;
  top: 60px;
  width: 230px;
  flex-shrink: 0;
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 18px 14px;
  background: var(--surface);
  border-right: 1px solid var(--line);
}
.sidenav .group-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--ink-400);
  padding: 6px 10px; margin-top: 10px;
}
.navitem {
  display: flex; align-items: center; gap: 9px;
  width: 100%; text-align: left;
  padding: 8px 10px; margin: 1px 0;
  border-radius: var(--radius-sm);
  border: none; background: transparent;
  color: var(--ink-700); font-size: 13px; font-weight: 500;
}
.navitem:hover { background: var(--surface-2); }
.navitem.active { background: var(--accent-soft); color: var(--accent-strong); font-weight: 600; }
.navitem .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.navitem .yr-badge {
  margin-left: auto; font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
}

.main {
  flex: 1;
  min-width: 0;
  padding: 28px 36px 80px;
  max-width: 1180px;
}

/* ============ Section + cards ============ */
.section-head { margin-bottom: 18px; }
.section-head h1 {
  font-size: 22px; font-weight: 650; letter-spacing: -0.02em; margin: 0 0 4px;
}
.section-head p { margin: 0; color: var(--ink-500); font-size: 13.5px; max-width: 70ch; }

.card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  margin-bottom: 20px;
}
.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
}
.card-head h2 { font-size: 14.5px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.card-head > svg { width: 17px; height: 17px; flex-shrink: 0; color: var(--accent); }
.verdict .icon svg { width: 20px; height: 20px; }
.card-head .hint { font-size: 12px; color: var(--ink-500); }
.card-head .spacer { flex: 1; }
.card-body { padding: 18px; }
.card-body.tight { padding: 10px 18px 14px; }

/* ============ Forms ============ */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 12px; font-weight: 600; color: var(--ink-700); }
.field .desc { font-size: 11.5px; color: var(--ink-400); font-weight: 400; }
.grid-fields {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 14px;
}

input.inp, select.inp {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--white);
  color: var(--ink-900);
  font-size: 13.5px;
  transition: border-color .12s, box-shadow .12s;
}
input.inp:focus, select.inp:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
input.inp.money { font-family: var(--font-mono); text-align: right; font-feature-settings: "tnum" 1; }
input.inp::placeholder { color: var(--ink-400); }

.inp-prefix {
  position: relative;
}
.inp-prefix > span {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--ink-400); font-size: 12px; font-family: var(--font-mono);
  pointer-events: none;
}
.inp-prefix input { padding-left: 24px; }

/* ============ Tables ============ */
table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
table.tbl th, table.tbl td { padding: 8px 12px; text-align: right; }
table.tbl th:first-child, table.tbl td:first-child { text-align: left; }
table.tbl thead th {
  font-size: 11px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase;
  color: var(--ink-500); border-bottom: 1px solid var(--line-strong);
  background: var(--surface-2);
}
table.tbl tbody tr { border-bottom: 1px solid var(--line); }
table.tbl tbody tr:last-child { border-bottom: none; }
table.tbl tbody tr:hover { background: var(--surface-2); }
table.tbl tfoot td {
  border-top: 2px solid var(--line-strong);
  font-weight: 700; background: var(--surface-2);
}
table.tbl .cell-input input {
  width: 100%; border: 1px solid transparent; background: transparent;
  padding: 5px 6px; border-radius: 5px; text-align: right;
  font-family: var(--font-mono); font-size: 13px; font-feature-settings: "tnum" 1;
  color: var(--ink-900);
}
table.tbl .cell-input input:hover { border-color: var(--line-strong); background: var(--white); }
table.tbl .cell-input input:focus { outline: none; border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 2px var(--accent-soft); }

.usd-val { color: var(--usd); font-size: 11.5px; }

/* ============ Month grid ============ */
.months {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}
.month-cell {
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px 9px;
  background: var(--surface);
}
.month-cell label { font-size: 10.5px; font-weight: 700; color: var(--ink-400); text-transform: uppercase; letter-spacing: 0.04em; }
.month-cell input {
  width: 100%; border: none; background: transparent; padding: 3px 0 0;
  font-family: var(--font-mono); font-size: 13.5px; text-align: right; color: var(--ink-900);
  font-feature-settings: "tnum" 1;
}
.month-cell input:focus { outline: none; }
.month-cell:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }

/* ============ Badges / status ============ */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 100px;
  font-size: 11.5px; font-weight: 600; letter-spacing: 0.01em;
}
.badge .dot { width: 7px; height: 7px; border-radius: 50%; }
.badge.ok { background: var(--ok-soft); color: oklch(0.4 0.13 155); }
.badge.ok .dot { background: var(--ok); }
.badge.warn { background: var(--warn-soft); color: oklch(0.48 0.13 65); }
.badge.warn .dot { background: var(--warn); }
.badge.bad { background: var(--bad-soft); color: oklch(0.47 0.18 25); }
.badge.bad .dot { background: var(--bad); }
.badge.neutral { background: var(--surface-2); color: var(--ink-500); border: 1px solid var(--line); }

.dot-ok { background: var(--ok); }
.dot-warn { background: var(--warn); }
.dot-bad { background: var(--bad); }
.dot-neutral { background: var(--ink-400); }

/* ============ Result panel ============ */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.stat {
  background: var(--white);
  padding: 14px 16px;
}
.stat .lbl { font-size: 11px; font-weight: 600; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.04em; display: flex; align-items: center; gap: 6px; }
.stat .val { font-family: var(--font-mono); font-size: 21px; font-weight: 600; margin-top: 5px; letter-spacing: -0.01em; }
.stat .val.pos { color: var(--ok); }
.stat .val.neg { color: var(--bad); }
.stat .usd { font-size: 12px; color: var(--usd); font-family: var(--font-mono); margin-top: 2px; }

.justif {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.justif .col h3 {
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--ink-500); margin: 0 0 8px; font-weight: 700;
}
.justif .row {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 7px 0; border-bottom: 1px dashed var(--line);
  font-size: 13px;
}
.justif .row .v { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }
.justif .row.total { border-bottom: none; border-top: 2px solid var(--line-strong); font-weight: 700; margin-top: 4px; padding-top: 9px; }

.verdict {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; border-radius: var(--radius);
  margin-bottom: 18px;
}
.verdict.ok { background: var(--ok-soft); border: 1px solid var(--ok); }
.verdict.warn { background: var(--warn-soft); border: 1px solid var(--warn); }
.verdict.bad { background: var(--bad-soft); border: 1px solid var(--bad); }
.verdict .icon {
  width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
  display: grid; place-items: center; color: white;
}
.verdict.ok .icon { background: var(--ok); }
.verdict.warn .icon { background: var(--warn); }
.verdict.bad .icon { background: var(--bad); }
.verdict .txt strong { font-size: 15px; display: block; }
.verdict .txt span { font-size: 13px; color: var(--ink-700); }
.verdict .amt { margin-left: auto; text-align: right; }
.verdict .amt .n { font-family: var(--font-mono); font-size: 22px; font-weight: 700; }
.verdict .amt .l { font-size: 11px; color: var(--ink-500); text-transform: uppercase; letter-spacing: 0.04em; }

/* ============ Alerts ============ */
.alert {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 11px 14px; border-radius: var(--radius-sm);
  font-size: 12.5px; margin-top: 12px;
}
.alert.warn { background: var(--warn-soft); color: oklch(0.42 0.1 65); }
.alert.info { background: var(--accent-soft); color: var(--accent-strong); }
.alert svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

/* ============ Summary table ============ */
.summary-wrap { overflow-x: auto; }
table.summary { min-width: 760px; }
table.summary tbody tr td:first-child { font-weight: 600; }

.subtle { color: var(--ink-500); }
.tiny { font-size: 11.5px; }
.right { text-align: right; }
.flex { display: flex; align-items: center; gap: 10px; }
.wrap-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.toggle-usd {
  display: inline-flex; border: 1px solid var(--line-strong); border-radius: var(--radius-sm); overflow: hidden;
}
.toggle-usd button {
  border: none; background: var(--white); padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--ink-500);
}
.toggle-usd button.active { background: var(--accent); color: white; }

.empty {
  text-align: center; padding: 50px 20px; color: var(--ink-400);
}
.divider { height: 1px; background: var(--line); margin: 16px 0; }

.year-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.year-tab {
  padding: 7px 13px; border-radius: var(--radius-sm); border: 1px solid var(--line);
  background: var(--white); font-family: var(--font-mono); font-weight: 600; font-size: 13px; color: var(--ink-500);
  display: flex; align-items: center; gap: 7px;
}
.year-tab:hover { border-color: var(--ink-400); }
.year-tab.active { background: var(--ink-900); color: white; border-color: var(--ink-900); }
.year-tab .dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── Multi-contribuyente panel ── */
.client-btn { gap: 7px; max-width: 220px; }
.client-panel {
  position: absolute; top: calc(100% + 8px); right: 0;
  width: 300px;
  background: var(--white);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  z-index: 200;
  overflow: hidden;
}
.cp-head {
  padding: 10px 14px 8px;
  font-size: 10.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--ink-400);
  border-bottom: 1px solid var(--line);
}
.cp-list { max-height: 240px; overflow-y: auto; }
.cp-item {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--line);
}
.cp-item.active { background: var(--accent-soft); }
.cp-select {
  flex: 1; display: flex; flex-direction: column; align-items: flex-start;
  gap: 1px; padding: 9px 13px;
  border: none; background: transparent; cursor: pointer; text-align: left;
}
.cp-select:hover { background: var(--surface-2); }
.cp-item.active .cp-select:hover { background: oklch(0.91 0.04 195); }
.cp-name { font-size: 13px; font-weight: 600; color: var(--ink-900); }
.cp-cuit { font-size: 11px; font-family: var(--font-mono); color: var(--ink-500); }
.cp-item.active .cp-name { color: var(--accent-strong); }
.cp-del {
  width: 30px; height: 30px; flex-shrink: 0; margin-right: 8px;
  border: none; background: transparent; cursor: pointer;
  color: var(--ink-400); font-size: 18px; line-height: 1;
  border-radius: 50%;
}
.cp-del:hover { background: var(--bad-soft); color: var(--bad); }
.cp-new {
  display: flex; gap: 8px; padding: 10px 12px;
  border-top: 1px solid var(--line);
  background: var(--surface);
}
.cp-input { flex: 1; font-size: 12.5px !important; padding: 7px 9px !important; }
.cp-add-btn { padding: 7px 11px; font-size: 12px; white-space: nowrap; }

/* ============================================================
   Datos de referencia del Monotributo (Argentina)

  <script>
/* ============================================================
   Motor de cálculo — Justificación de variaciones patrimoniales
   adaptado a monotributistas.
   Funciones puras: reciben el estado y devuelven resultados.
   ============================================================ */
(function () {
  "use strict";

  var COMPONENTES = window.MonoData.COMPONENTES;

  function sum(arr) {
    return (arr || []).reduce(function (a, b) { return a + (Number(b) || 0); }, 0);
  }

  function num(v) { return Number(v) || 0; }

  // Patrimonio neto = suma de componentes con su signo (deudas restan).
  function patrimonioNeto(comp) {
    if (!comp) return 0;
    return COMPONENTES.reduce(function (acc, c) {
      return acc + c.signo * num(comp[c.key]);
    }, 0);
  }

  // Activo bruto (sin restar deudas) — útil para mostrar.
  function activoBruto(comp) {
    if (!comp) return 0;
    return COMPONENTES.reduce(function (acc, c) {
      return c.signo > 0 ? acc + num(comp[c.key]) : acc;
    }, 0);
  }

  function calcAnio(anio, pnInicio, cajaAcumPrevia) {
    var ingresosAnuales = sum(anio.ingresosMensuales);
    var comprasAnuales = sum(anio.comprasMensuales);
    var cajaPresuntaAnio = ingresosAnuales - comprasAnuales;
    var cajaPresuntaAcum = cajaAcumPrevia + cajaPresuntaAnio;

    var o = anio.origenes || {};
    var otrosOrigenes = num(o.prestamos) + num(o.herencias) + num(o.ventaBienes) + num(o.ahorrosPrevios);
    var totalOrigenes = ingresosAnuales + otrosOrigenes;

    var pnCierre = patrimonioNeto(anio.patrimonioCierre);
    var variacionPatrimonial = pnCierre - pnInicio;

    // Cuadro de justificación:
    // Orígenes (PN inicio + ingresos + otros) = Aplicaciones (PN cierre + consumido)
    // => consumido implícito es el balanceo.
    var consumidoImplicito = pnInicio + totalOrigenes - pnCierre;

    var consumoMinimo = num(anio.consumoMinimo);
    var margen = consumidoImplicito - consumoMinimo;

    var estado;
    if (consumidoImplicito < 0) estado = "no-justificado";
    else if (margen < 0) estado = "ajustado";
    else estado = "justificado";

    var topeAnual = num(anio.topeAnual);
    var excedeTope = topeAnual > 0 && ingresosAnuales > topeAnual;
    var usoTope = topeAnual > 0 ? ingresosAnuales / topeAnual : 0;

    var tc = anio.tc || { prom: 1, cierre: 1 };

    return {
      anio: anio.anio,
      ingresosAnuales: ingresosAnuales,
      comprasAnuales: comprasAnuales,
      cajaPresuntaAnio: cajaPresuntaAnio,
      cajaPresuntaAcum: cajaPresuntaAcum,
      otrosOrigenes: otrosOrigenes,
      totalOrigenes: totalOrigenes,
      pnInicio: pnInicio,
      pnCierre: pnCierre,
      activoCierre: activoBruto(anio.patrimonioCierre),
      variacionPatrimonial: variacionPatrimonial,
      consumidoImplicito: consumidoImplicito,
      consumoMinimo: consumoMinimo,
      margen: margen,
      estado: estado,
      topeAnual: topeAnual,
      excedeTope: excedeTope,
      usoTope: usoTope,
      // Liquidez declarada vs presunta (cruce)
      liquidezDeclarada: num((anio.patrimonioCierre || {}).efectivo) + num((anio.patrimonioCierre || {}).inversiones),
      tc: tc,
      // Valores en USD (orientativos)
      usd: {
        ingresosAnuales: tc.prom ? ingresosAnuales / tc.prom : 0,
        pnCierre: tc.cierre ? pnCierre / tc.cierre : 0,
        consumidoImplicito: tc.prom ? consumidoImplicito / tc.prom : 0,
        margen: tc.prom ? margen / tc.prom : 0,
        cajaPresuntaAcum: tc.cierre ? cajaPresuntaAcum / tc.cierre : 0
      }
    };
  }

  function computeAll(state) {
    var anios = (state.anios || []).slice().sort(function (a, b) { return a.anio - b.anio; });
    var pnInicial = patrimonioNeto(state.patrimonioInicial);
    var resultados = [];
    var pnInicioActual = pnInicial;
    var cajaAcum = 0;

    for (var i = 0; i < anios.length; i++) {
      var r = calcAnio(anios[i], pnInicioActual, cajaAcum);
      resultados.push(r);
      pnInicioActual = r.pnCierre; // el cierre se arrastra como inicio del siguiente
      cajaAcum = r.cajaPresuntaAcum;
    }

    var totalIngresos = resultados.reduce(function (a, r) { return a + r.ingresosAnuales; }, 0);
    var totalConsumido = resultados.reduce(function (a, r) { return a + r.consumidoImplicito; }, 0);
    var ultimo = resultados[resultados.length - 1];

    return {
      patrimonioNetoInicial: pnInicial,
      resultados: resultados,
      resumen: {
        totalIngresos: totalIngresos,
        totalConsumido: totalConsumido,
        pnFinal: ultimo ? ultimo.pnCierre : pnInicial,
        cajaPresuntaAcum: ultimo ? ultimo.cajaPresuntaAcum : 0,
        liquidezDeclaradaFinal: ultimo ? ultimo.liquidezDeclarada : 0,
        crecimientoPatrimonial: (ultimo ? ultimo.pnCierre : pnInicial) - pnInicial,
        aniosNoJustificados: resultados.filter(function (r) { return r.estado === "no-justificado"; }).length,
        aniosAjustados: resultados.filter(function (r) { return r.estado === "ajustado"; }).length
      }
    };
  }

  window.MonoCalc = {
    sum: sum,
    patrimonioNeto: patrimonioNeto,
    activoBruto: activoBruto,
    calcAnio: calcAnio,
    computeAll: computeAll
  };
})();

  <script>
/* Formato de números en es-AR + helpers de UI */
(function () {
  "use strict";

  var nf0 = new Intl.NumberFormat("es-AR", { maximumFractionDigits: 0 });
  var nf2 = new Intl.NumberFormat("es-AR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  function money(v, opts) {
    opts = opts || {};
    var n = Number(v) || 0;
    var sign = n < 0 ? "-" : "";
    var abs = Math.abs(n);
    var body = opts.dec ? nf2.format(abs) : nf0.format(Math.round(abs));
    var cur = opts.usd ? "US$" : "$";
    return sign + cur + " " + body;
  }

  function plain(v) {
    var n = Number(v) || 0;
    return nf0.format(Math.round(n));
  }

  // Parser tolerante: acepta "1.234.567,89" o "1234567.89".
  function parse(str) {
    if (typeof str === "number") return str;
    if (!str) return 0;
    var s = String(str).trim().replace(/[^\d.,-]/g, "");
    if (s === "" || s === "-") return 0;
    // Si tiene tanto . como , asumimos formato es-AR (. miles, , decimal)
    if (s.indexOf(",") > -1 && s.indexOf(".") > -1) {
      s = s.replace(/\./g, "").replace(",", ".");
    } else if (s.indexOf(",") > -1) {
      s = s.replace(",", ".");
    }
    var n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  window.Fmt = { money: money, plain: plain, parse: parse };
})();

  var Z_MONEY = '#,##0';

  function cellN(v) { return { t: "n", v: Number(v) || 0, z: Z_MONEY }; }
  function cellF(f, cached) { return { t: "n", f: f, v: Number(cached) || 0, z: Z_MONEY }; }
  function cellS(s) { return { t: "s", v: s == null ? "" : String(s) }; }

  // Construye una hoja a partir de filas [ [A, B], ... ] donde cada celda
  // puede ser string, número, o {f, v} para fórmula.
  function makeSheet(rows) {

    for (var r = 0; r < rows.length; r++) {
      var row = rows[r] || [];
      for (var c = 0; c < row.length; c++) {
        if (c > maxC) maxC = c;
        var val = row[c];
        if (val === null || val === undefined || val === "") continue;
        var addr = XLSX.utils.encode_cell({ r: r, c: c });
        if (typeof val === "number") ws[addr] = cellN(val);
        else if (typeof val === "string") ws[addr] = cellS(val);
        else if (val.f) ws[addr] = cellF(val.f, val.v);
        else if (val.bold) ws[addr] = cellS(val.t || "");
        else ws[addr] = cellS(String(val));
      }
    }
    ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: maxR, c: Math.max(maxC, 1) } });
    ws["!cols"] = [{ wch: 34 }, { wch: 20 }, { wch: 18 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 16 }];
    return ws;

    XLSX.utils.book_append_sheet(wb, wsC, "Contribuyente");

  function estadoLabel(e){ return e==='justificado'?'Justificado':e==='ajustado'?'Ajustado / a revisar':'No justificado'; }
  function estadoCls(e){ return e==='justificado'?'ok':e==='ajustado'?'warn':'bad'; }

  /* ---- SVG BAR CHART ---- */
  /* A4 content width ~700px, two-col = ~330px, full = ~680px */
  function barChart(datos, keys, colors, labels, W, H) {
    var pl=64, pr=12, pt=26, pb=36;
    var cw=W-pl-pr, ch=H-pt-pb;
    var n=datos.length; if(!n) return '';
    var maxV=1;
    datos.forEach(function(d){ keys.forEach(function(k){ if(Math.abs(d[k]||0)>maxV) maxV=Math.abs(d[k]||0); }); });
    var bw=Math.max(6, Math.floor(cw/n/keys.length)-3);
    function bx(i,ki){ return pl+i*(cw/n)+(cw/n-bw*keys.length)/2+ki*bw; }
    function by(v){ return pt+ch-(Math.abs(v||0)/maxV)*ch; }
    function bh(v){ return Math.max(1,(Math.abs(v||0)/maxV)*ch); }
    var svg='<svg width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">';
    for(var t=0;t<=3;t++){
      var yv=(t/3)*maxV, yt=pt+ch-(t/3)*ch;
      var lbl=yv>=1e9?(yv/1e9).toFixed(1)+'B':yv>=1e6?(yv/1e6).toFixed(0)+'M':yv>=1e3?(yv/1e3).toFixed(0)+'K':'0';
      svg+='<line x1="'+pl+'" y1="'+yt+'" x2="'+(pl+cw)+'" y2="'+yt+'" stroke="#e2e8f0" stroke-width="1"/>';
      svg+='<text x="'+(pl-5)+'" y="'+(yt+4)+'" text-anchor="end" font-size="8.5" fill="#94a3b8" font-family="IBM Plex Mono,monospace">'+lbl+'</text>';
    }
    datos.forEach(function(d,i){
      keys.forEach(function(k,ki){
        var v=d[k]||0, fill=v<0?'#ef4444':colors[ki];
        svg+='<rect x="'+bx(i,ki)+'" y="'+by(v)+'" width="'+(bw-1)+'" height="'+bh(v)+'" fill="'+fill+'" rx="2"/>';
      });
      svg+='<text x="'+(pl+i*(cw/n)+cw/n/2)+'" y="'+(H-pb+13)+'" text-anchor="middle" font-size="9" fill="#64748b" font-family="IBM Plex Sans,sans-serif">'+d.anio+'</text>';
    });
    labels.forEach(function(l,i){
      svg+='<rect x="'+(pl+i*120)+'" y="7" width="9" height="9" fill="'+colors[i]+'" rx="2"/>';
      svg+='<text x="'+(pl+i*120+13)+'" y="15.5" font-size="9" fill="#475569" font-family="IBM Plex Sans,sans-serif">'+l+'</text>';
    });
    svg+='</svg>'; return svg;
  }

  /* ---- SVG LINE CHART ---- */
  function lineChart(datos, keys, colors, labels, W, H) {
    var pl=64, pr=12, pt=26, pb=36;
    var cw=W-pl-pr, ch=H-pt-pb;
    var n=datos.length; if(n<2) return '<svg width="'+W+'" height="'+H+'"><text x="50%" y="50%" text-anchor="middle" fill="#94a3b8" font-size="11">Datos insuficientes</text></svg>';
    var minV=0, maxV=1;
    datos.forEach(function(d){ keys.forEach(function(k){ var v=d[k]||0; if(v>maxV)maxV=v; if(v<minV)minV=v; }); });
    if(maxV===minV) maxV=minV+1;
    function px(i){ return pl+i*(cw/(n-1)); }
    function py(v){ return pt+ch-((v-minV)/(maxV-minV))*ch; }
    var svg='<svg width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">';
    for(var t=0;t<=3;t++){
      var yv=minV+(t/3)*(maxV-minV), yt=pt+ch-(t/3)*ch;
      var lbl=yv>=1e9?(yv/1e9).toFixed(1)+'B':yv>=1e6?(yv/1e6).toFixed(0)+'M':yv>=1e3?(yv/1e3).toFixed(0)+'K':yv.toFixed(0);
      svg+='<line x1="'+pl+'" y1="'+yt+'" x2="'+(pl+cw)+'" y2="'+yt+'" stroke="#e2e8f0" stroke-width="1"/>';
      svg+='<text x="'+(pl-5)+'" y="'+(yt+4)+'" text-anchor="end" font-size="8.5" fill="#94a3b8" font-family="IBM Plex Mono,monospace">'+lbl+'</text>';
    }
    keys.forEach(function(k,ki){
      var pts=datos.map(function(d,i){ return px(i)+','+py(d[k]||0); }).join(' ');
      svg+='<polyline points="'+pts+'" fill="none" stroke="'+colors[ki]+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
      datos.forEach(function(d,i){
        svg+='<circle cx="'+px(i)+'" cy="'+py(d[k]||0)+'" r="3" fill="'+colors[ki]+'" stroke="white" stroke-width="1.5"/>';
      });
    });
    datos.forEach(function(d,i){
      svg+='<text x="'+px(i)+'" y="'+(H-pb+13)+'" text-anchor="middle" font-size="9" fill="#64748b" font-family="IBM Plex Sans,sans-serif">'+d.anio+'</text>';
    });
    labels.forEach(function(l,i){
      svg+='<rect x="'+(pl+i*120)+'" y="7" width="9" height="9" fill="'+colors[i]+'" rx="2"/>';
      svg+='<text x="'+(pl+i*120+13)+'" y="15.5" font-size="9" fill="#475569" font-family="IBM Plex Sans,sans-serif">'+l+'</text>';
    });
    svg+='</svg>'; return svg;
  }

const { useState, useRef, useEffect } = React;
const Fmt = window.Fmt;

/* ---- Iconos (stroke, estilo Lucide) ---- */
const Icon = {

/* ---- Input de dinero con formato es-AR al perder foco ---- */
function MoneyInput({ value, onChange, className, placeholder, prefix }) {
  const [text, setText] = useState("");
  const [focused, setFocused] = useState(false);
  useEffect(() => {
    if (!focused) setText(value ? Fmt.plain(value) : "");
  }, [value, focused]);
  const cls = "inp money" + (className ? " " + className : "");
  const inp = (
    <input
      className={cls}
      inputMode="decimal"
      placeholder={placeholder || "0"}
      value={text}
      onFocus={(e) => { setFocused(true); setText(value ? String(value) : ""); requestAnimationFrame(() => e.target.select()); }}
      onBlur={() => { setFocused(false); }}
      onChange={(e) => { setText(e.target.value); onChange(Fmt.parse(e.target.value)); }}
    />
  );
  if (prefix) return <div className="inp-prefix"><span>{prefix}</span>{inp}</div>;
  return inp;
}

/* ---- Celda de tabla con input de dinero ---- */
function CellMoney({ value, onChange }) {
  const [text, setText] = useState("");
  const [focused, setFocused] = useState(false);
  useEffect(() => { if (!focused) setText(value ? Fmt.plain(value) : ""); }, [value, focused]);
  return (
    <td className="cell-input num">
      <input
        inputMode="decimal"
        placeholder="0"
        value={text}
        onFocus={(e) => { setFocused(true); setText(value ? String(value) : ""); requestAnimationFrame(() => e.target.select()); }}
        onBlur={() => setFocused(false)}
        onChange={(e) => { setText(e.target.value); onChange(Fmt.parse(e.target.value)); }}
      />
    </td>
  );
}

/* ---- Grilla de 12 meses ---- */
function MonthGrid({ values, onChange }) {
  const MESES_ABBR = window.MonoData.MESES_ABBR;
  return (
    <div className="months">
      {MESES_ABBR.map((m, i) => (
        <MonthCell key={i} label={m} value={values[i]} onChange={(v) => {
          const next = values.slice(); next[i] = v; onChange(next);
        }} />
      ))}
    </div>
  );
}
function MonthCell({ label, value, onChange }) {
  const [text, setText] = useState("");
  const [focused, setFocused] = useState(false);
  useEffect(() => { if (!focused) setText(value ? Fmt.plain(value) : ""); }, [value, focused]);
  return (
    <div className="month-cell">
      <label>{label}</label>
      <input
        inputMode="decimal" placeholder="0" value={text}
        onFocus={(e) => { setFocused(true); setText(value ? String(value) : ""); requestAnimationFrame(() => e.target.select()); }}
        onBlur={() => setFocused(false)}
        onChange={(e) => { setText(e.target.value); onChange(Fmt.parse(e.target.value)); }}
      />
    </div>
  );
}

/* ---- Tabla de componentes del patrimonio ---- */
function PatrimonioTable({ comp, onChange, tcCierre, showUsd }) {
  const COMPONENTES = window.MonoData.COMPONENTES;
  const MonoCalc = window.MonoCalc;
  const pn = MonoCalc.patrimonioNeto(comp);
  return (
    <table className="tbl">
      <thead>
        <tr>
          <th>Componente</th>
          <th>Pesos</th>
          {showUsd && <th>USD (cierre)</th>}
        </tr>
      </thead>
      <tbody>
        {COMPONENTES.map((c) => {
          const v = Number(comp[c.key]) || 0;
          return (
            <tr key={c.key}>
              <td>{c.label}{c.signo < 0 && <span className="subtle tiny"> (resta)</span>}</td>
              <CellMoney value={comp[c.key]} onChange={(val) => onChange(Object.assign({}, comp, { [c.key]: val }))} />
              {showUsd && <td className="usd-val num">{tcCierre ? Fmt.money(v / tcCierre, { usd: true }) : "—"}</td>}
            </tr>
          );
        })}
      </tbody>
      <tfoot>
        <tr>
          <td>Patrimonio Neto</td>
          <td className="num">{Fmt.money(pn)}</td>
          {showUsd && <td className="usd-val num">{tcCierre ? Fmt.money(pn / tcCierre, { usd: true }) : "—"}</td>}
        </tr>
      </tfoot>
    </table>
  );
}

/* ---- Badge de estado ---- */
function EstadoBadge({ estado }) {
  const map = {
    "justificado": { cls: "ok", txt: "Justificado" },
    "ajustado": { cls: "warn", txt: "Ajustado / a revisar" },
    "no-justificado": { cls: "bad", txt: "No justificado" }
  };
  const m = map[estado] || { cls: "neutral", txt: "—" };
  return <span className={"badge " + m.cls}><span className="dot"></span>{m.txt}</span>;
}

Object.assign(window, { Icon, MoneyInput, CellMoney, MonthGrid, PatrimonioTable, EstadoBadge });

  <script type="text/babel">
/* ============================================================
   App principal — multi-contribuyente
   ============================================================ */
const { useState: useStateA, useEffect: useEffectA, useMemo } = React;
const FmtA = window.Fmt;
const MonoDataA = window.MonoData;
const { Icon, ContribuyenteSection, PatrimonioInicialSection, TablaMonotributoSection, ResumenSection, YearPanel } = window;

const LEGACY_KEY = "monotributo-analisis-v1";
const DB_KEY     = "mono-db-v1"; /* fallback local, ya no es la fuente de verdad */

function emptyComp() {
  return { inmuebles: 0, rodados: 0, efectivo: 0, inversiones: 0, muebles: 0, deudas: 0 };
}
function emptyYear(anio, categoria) {
  const cat = categoria || "D";
  return {
    anio: anio, categoria: cat,
    topeAnual: MonoDataA.topePorCategoria(cat),
    tc: MonoDataA.tcParaAnio(anio),
    ingresosMensuales: new Array(12).fill(0),
    comprasMensuales: new Array(12).fill(0),
    origenes: { ahorrosPrevios: 0, prestamos: 0, herencias: 0, ventaBienes: 0 },
    patrimonioCierre: emptyComp(),
    consumoMinimo: 0
  };
}
function defaultClientState(nombre) {
  const base = 2020;
  const anios = [];
  for (let y = base; y <= 2026; y++) anios.push(emptyYear(y));
  return {
    contribuyente: { nombre: nombre || "", cuit: "", actividad: "", tipoActividad: "servicios" },
    patrimonioInicial: emptyComp(),
    anioBase: base,
    anios: anios
  };
}
function genId() { return "c" + Date.now() + Math.random().toString(36).slice(2, 6); }

function emptyDB() {
  const id = genId();
  return { clientes: [{ id: id, state: defaultClientState("") }], activeId: id };
}

/* Migra datos viejos de localStorage (un solo uso, la primera vez que alguien
   entra ya logueado y la nube todavía no tiene nada) */
function loadLocalLegacyDB() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      const db = JSON.parse(raw);
      if (db && db.clientes && db.clientes.length) return db;
    }
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      if (parsed && parsed.anios) {
        const id = genId();
        return { clientes: [{ id: id, state: parsed }], activeId: id };
      }
    }
  } catch (e) {}
  return null;
}

/* ============================================================
   Pantalla de Login
   ============================================================ */
function LoginScreen() {
  const [email, setEmail] = useStateA("");
  const [pass, setPass]   = useStateA("");
  const [err, setErr]     = useStateA("");
  const [loading, setLoading] = useStateA(false);

  function doLogin(e) {
    e.preventDefault();
    setErr(""); setLoading(true);
    fbAuth.signInWithEmailAndPassword(email, pass)
      .catch(function(error) {
        let msg = "No se pudo iniciar sesión.";
        if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
          msg = "Email o contraseña incorrectos.";
        } else if (error.code === "auth/invalid-email") {
          msg = "El email no es válido.";
        } else if (error.code === "auth/too-many-requests") {
          msg = "Demasiados intentos. Probá de nuevo en unos minutos.";
        }
        setErr(msg);
      })
      .finally(function() { setLoading(false); });
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <form onSubmit={doLogin} style={{width:360,maxWidth:"90vw",background:"var(--white)",border:"1px solid var(--line)",borderRadius:"var(--radius)",padding:"32px 28px",boxShadow:"var(--shadow-md)"}}>
        <div style={{display:"flex",alignItems:"center",gap:0,lineHeight:1,marginBottom:28,justifyContent:"center"}}>
          <span style={{fontSize:18,color:"var(--ink-400)",fontWeight:400,fontFamily:"Georgia,serif"}}>[</span>
          <div style={{padding:"0 8px",textAlign:"center"}}>
            <div style={{fontFamily:"Georgia,'Times New Roman',serif",fontWeight:700,fontSize:17,letterSpacing:"0.04em",color:"var(--ink-900)",textTransform:"uppercase",lineHeight:1.1}}>LÓPEZ CASTRO</div>
            <div style={{fontFamily:"var(--font-sans)",fontWeight:500,fontSize:8,letterSpacing:"0.18em",color:"var(--ink-500)",textTransform:"uppercase",marginTop:3}}>ESTRATEGIAS IMPOSITIVAS</div>
          </div>
          <span style={{fontSize:18,color:"var(--ink-400)",fontWeight:400,fontFamily:"Georgia,serif"}}>]</span>
        </div>

        <div style={{fontSize:13,fontWeight:600,color:"var(--ink-700)",textAlign:"center",marginBottom:20}}>
          Análisis Patrimonial — Acceso al estudio
        </div>

        <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:"var(--ink-500)",marginBottom:5}}>Email</label>
        <input type="email" required autoFocus className="inp" style={{width:"100%",marginBottom:14}}
          value={email} onChange={function(e){ setEmail(e.target.value); }} placeholder="nombre@estudio.com" />

        <label style={{display:"block",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",color:"var(--ink-500)",marginBottom:5}}>Contraseña</label>
        <input type="password" required className="inp" style={{width:"100%",marginBottom:18}}
          value={pass} onChange={function(e){ setPass(e.target.value); }} placeholder="••••••••" />

        {err && (
          <div style={{background:"var(--bad-soft)",color:"var(--bad)",fontSize:12,padding:"8px 11px",borderRadius:"var(--radius-sm)",marginBottom:14}}>{err}</div>
        )}

        <button type="submit" className="btn primary" disabled={loading} style={{width:"100%",justifyContent:"center",padding:"10px 0"}}>
          {loading ? "Ingresando…" : "Ingresar"}
        </button>

        <div style={{fontSize:11,color:"var(--ink-400)",textAlign:"center",marginTop:18}}>
          Acceso exclusivo para personal del estudio.<br/>Los usuarios se crean desde la consola de Firebase.
        </div>
      </form>
    </div>
  );
}

/* ============================================================
   App principal (autenticada) — sincronizada con Firestore
   ============================================================ */
function MainApp() {
  const [db, setDbLocal] = useStateA(null);   /* null = cargando desde la nube */
  const [view, setView] = useStateA("contribuyente");
  const [mostrarUsd, setMostrarUsd] = useStateA(false);
  const [showClientPanel, setShowClientPanel] = useStateA(false);
  const [newClientName, setNewClientName] = useStateA("");
  const [syncing, setSyncing] = useStateA(false);
  const skipNextWrite = React.useRef(false);

  /* Suscripción en tiempo real a Firestore */
  useEffectA(function() {
    const unsub = fsDocRef().onSnapshot(function(snap) {
      if (snap.exists) {
        skipNextWrite.current = true;
        setDbLocal(snap.data());
      } else {
        /* Primera vez: ver si hay datos locales viejos para migrar, si no, DB vacía */
        const legacy = loadLocalLegacyDB();
        const initial = legacy || emptyDB();
        fsDocRef().set(initial).then(function() {
          skipNextWrite.current = true;
          setDbLocal(initial);
        });
      }
    }, function(error) {
      console.error("Firestore onSnapshot error:", error);
    });
    return function() { unsub(); };
  }, []);

  /* Escribe a Firestore cada vez que cambia el estado local (salvo cuando el cambio vino de la nube) */
  useEffectA(function() {
    if (db == null) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    setSyncing(true);
    fsDocRef().set(db)
      .catch(function(e){ console.error("Error guardando en la nube:", e); })
      .finally(function(){ setSyncing(false); });
  }, [db]);

  if (db == null) {
    return (
      <div className="empty" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        Cargando datos del estudio…
      </div>
    );
  }

  const activeClient = db.clientes.find(function(c) { return c.id === db.activeId; }) || db.clientes[0];
  const state = activeClient.state;

  function setState(updater) {
    setDbLocal(function(db) {
      const next = db.clientes.map(function(c) {
        if (c.id === db.activeId) {
          const newState = typeof updater === "function" ? updater(c.state) : updater;
          return { id: c.id, state: newState };
        }
        return c;
      });
      return { clientes: next, activeId: db.activeId };
    });
  }

  const computed = useMemo(function() { return window.MonoCalc.computeAll(state); }, [state]);
  const anios = state.anios.slice().sort(function(a, b) { return a.anio - b.anio; });

  function updateYear(anio, nextYear) {
    setState(function(s) {
      return { ...s, anios: s.anios.map(function(a) { return a.anio === anio ? nextYear : a; }) };
    });
  }
  function addYear() {
    const max = anios.length ? anios[anios.length - 1].anio : state.anioBase - 1;
    const lastCat = anios.length ? anios[anios.length - 1].categoria : "D";
    const ny = emptyYear(max + 1, lastCat);
    if (anios.length) ny.patrimonioCierre = Object.assign({}, anios[anios.length - 1].patrimonioCierre);
    setState(function(s) { return { ...s, anios: [...s.anios, ny] }; });
    setView("year-" + (max + 1));
  }
  function deleteYear(anio) {
    if (!confirm("¿Eliminar el ejercicio " + anio + "? Se perderán sus datos.")) return;
    setState(function(s) { return { ...s, anios: s.anios.filter(function(a) { return a.anio !== anio; }) }; });
    setView("resumen");
  }

  function switchClient(id) {
    setDbLocal(function(db) { return { clientes: db.clientes, activeId: id }; });
    setView("contribuyente");
    setShowClientPanel(false);
  }
  function addClient() {
    const name = newClientName.trim();
    if (!name) return;
    const id = genId();
    const newEntry = { id: id, state: defaultClientState(name) };
    setDbLocal(function(db) { return { clientes: db.clientes.concat([newEntry]), activeId: id }; });
    setNewClientName("");
    setView("contribuyente");
    setShowClientPanel(false);
  }
  function deleteClient(id) {
    if (db.clientes.length <= 1) { alert("Debe haber al menos un contribuyente."); return; }
    const found = db.clientes.find(function(c) { return c.id === id; });
    const nombre = (found && found.state && found.state.contribuyente && found.state.contribuyente.nombre) || "este contribuyente";
    if (!confirm("¿Eliminar a " + nombre + " y todos sus datos? Esta acción no se puede deshacer.")) return;
    setDbLocal(function(db) {
      const next = db.clientes.filter(function(c) { return c.id !== id; });
      const newActive = db.activeId === id ? next[0].id : db.activeId;

          <div>
            <div className="title">Análisis Patrimonial</div>
            <div className="sub">Monotributistas · justificación de bienes</div>
          </div>
        </div>
        <div className="spacer"></div>

        <div style={{fontSize:11,color:"var(--ink-400)",display:"flex",alignItems:"center",gap:5,marginRight:4}}>
          <span style={{width:7,height:7,borderRadius:"50%",background: syncing ? "var(--warn)" : "var(--ok)",display:"inline-block",transition:"background 0.3s"}}></span>
          {syncing ? "Sincronizando…" : "Sincronizado"}
        </div>

        <div style={{position:"relative"}}>
          <button className="btn ghost client-btn" onClick={function() { setShowClientPanel(function(v) { return !v; }); }}>
            <Icon.user style={{width:15,height:15}}/>
            <span style={{maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{nombreActivo}</span>
            <span style={{fontSize:10,opacity:0.6,marginLeft:4}}>&#9662;</span>
          </button>

          {showClientPanel && (
            <div className="client-panel">
              <div className="cp-head">Contribuyentes guardados</div>
              <div className="cp-list">
                {db.clientes.map(function(c) {
                  const nom  = (c.state && c.state.contribuyente && c.state.contribuyente.nombre) || "Sin nombre";
                  const cuit = (c.state && c.state.contribuyente && c.state.contribuyente.cuit)   || "";
                  const isActive = c.id === db.activeId;
                  return (
                    <div key={c.id} className={"cp-item" + (isActive ? " active" : "")}>
                      <button className="cp-select" onClick={function() { switchClient(c.id); }}>
                        <span className="cp-name">{nom}</span>
                        {cuit && <span className="cp-cuit">{cuit}</span>}
                      </button>
                      {!isActive && (
                        <button className="cp-del" onClick={function() { deleteClient(c.id); }} title="Eliminar">&#215;</button>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="cp-new">
                <input
                  className="inp cp-input"
                  placeholder="Nombre del nuevo contribuyente"
                  value={newClientName}
                  onChange={function(e) { setNewClientName(e.target.value); }}
                  onKeyDown={function(e) { if (e.key === "Enter" && newClientName.trim()) addClient(); }}
                />
                <button className="btn primary cp-add-btn" onClick={addClient}>
                  <Icon.plus style={{width:14,height:14}}/>Agregar
                </button>
              </div>
            </div>
          )}
        </div>

        <div className="toggle-usd">
          <button className={!mostrarUsd ? "active" : ""} onClick={function() { setMostrarUsd(false); }}>ARS</button>
          <button className={mostrarUsd ? "active" : ""} onClick={function() { setMostrarUsd(true); }}>ARS + USD</button>
        </div>
        <button className="btn ghost" onClick={resetClient}><Icon.reset />Reiniciar</button>
        <button className="btn" style={{background:"#6366f1",borderColor:"#6366f1",color:"white"}} onClick={function() { window.generarReportePDF(state, computed); }}><Icon.chart style={{width:15,height:15}}/>Reporte</button>
        <button className="btn primary" onClick={function() { window.exportExcel(state, computed); }}><Icon.download />Exportar Excel</button>
        <button className="btn ghost" onClick={doLogout} title="Cerrar sesión"><Icon.x style={{width:15,height:15}}/></button>
      </header>

      <div className="body">
        <nav className="sidenav">
          <div className="group-label">General</div>
          <button className={"navitem" + (view === "contribuyente" ? " active" : "")} onClick={function() { setView("contribuyente"); }}>
            <Icon.user style={{width:16,height:16}}/>Contribuyente
          </button>
          <button className={"navitem" + (view === "patrimonio-inicial" ? " active" : "")} onClick={function() { setView("patrimonio-inicial"); }}>
            <Icon.wallet style={{width:16,height:16}}/>Patrimonio inicial
          </button>
          <button className={"navitem" + (view === "tabla" ? " active" : "")} onClick={function() { setView("tabla"); }}>
            <Icon.table style={{width:16,height:16}}/>Tabla Monotributo
          </button>

          <div className="group-label">Ejercicios</div>
          {anios.map(function(a, i) {
            return (
              <button key={a.anio} className={"navitem" + (view === "year-" + a.anio ? " active" : "")} onClick={function() { setView("year-" + a.anio); }}>
                <span className={"dot " + dotClass(computed.resultados[i].estado)}></span>
                Año {a.anio}
                <span className="yr-badge subtle">{FmtA.money(computed.resultados[i].pnCierre).replace("$ ", "$")}</span>
              </button>
            );
          })}
          <button className="navitem" onClick={addYear} style={{color:"var(--accent-strong)"}}>
            <Icon.plus style={{width:16,height:16}}/>Agregar año
          </button>

          <div className="group-label">Análisis</div>
          <button className={"navitem" + (view === "resumen" ? " active" : "")} onClick={function() { setView("resumen"); }}>
            <Icon.chart style={{width:16,height:16}}/>Resumen consolidado
          </button>
        </nav>

        <main className="main">{content}</main>
      </div>
    </div>
  );
}

/* ============================================================
   Root — decide entre Login y MainApp según estado de auth
   ============================================================ */
function Root() {
  const [user, setUser] = useStateA(undefined); /* undefined = todavía no se sabe */

  useEffectA(function() {
    const unsub = fbAuth.onAuthStateChanged(function(u) { setUser(u); });
    return function() { unsub(); };
  }, []);

  if (user === undefined) {
    return (
      <div className="empty" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        Verificando sesión…
      </div>
    );
  }
  if (!user) {
    return <LoginScreen />;
  }
  return <MainApp />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);


  
  
  </script>
</body>
